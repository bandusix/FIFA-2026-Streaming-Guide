name: Update PPV Streaming Links

on:
  schedule:
    # Run every 45 minutes to offset from live_streaming_crawler
    - cron: '15,45 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run PPV.to Streaming Crawler
        run: |
          cd streaming_crawlers
          python ppv_streaming_crawler.py

      - name: Ensure latest changes are pulled before pushing
        run: |
          git pull --rebase origin main || true
          git push origin main || true
