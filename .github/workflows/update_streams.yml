name: Update Streaming Deep Links

on:
  schedule:
    # Run every 30 minutes for third-party aggregators
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install chromium

      - name: Run Live Streaming Crawler
        run: |
          cd streaming_crawlers
          python live_streaming_crawler.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add streams.json || true
          git commit -m "chore(bot): auto update 3rd-party streaming deep links" || echo "No changes to commit"
          git push
