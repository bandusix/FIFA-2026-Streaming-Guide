<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="FIFA World Cup 2026 — full live & upcoming match schedule, localized to your time zone and language.">
<title>FIFA World Cup 2026 — Live Schedule</title>
<style>
  :root{
    --bg:#0a0e1a; --bg2:#0f1626; --card:#141d33; --card2:#1a2541;
    --line:#243353; --text:#eef3ff; --muted:#8da2c9; --muted2:#5d6f95;
    --accent:#00d9a3; --accent2:#3b82f6; --gold:#ffd24a; --live:#ff4d5e;
    --r:16px; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue","PingFang SC","Microsoft YaHei","Noto Sans",Arial,sans-serif;
    background:radial-gradient(1200px 700px at 80% -10%,#16224a 0%,transparent 55%),
               radial-gradient(900px 600px at -10% 10%,#0c2f2a 0%,transparent 50%),
               var(--bg);
    color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px 80px}

  header.hero{
    padding:34px 16px 26px;text-align:center;position:relative;overflow:hidden;
  }
  .hero .pitch{
    position:absolute;inset:0;opacity:.06;pointer-events:none;
    background:
      repeating-linear-gradient(90deg,transparent 0 60px,#fff 60px 62px);
  }
  .crest{font-size:13px;letter-spacing:3px;color:var(--accent);font-weight:700;text-transform:uppercase}
  h1{font-size:clamp(26px,5vw,44px);font-weight:800;margin:6px 0 4px;letter-spacing:-.5px;
     background:linear-gradient(90deg,#fff, #bcd2ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hosts{color:var(--muted);font-size:15px;font-weight:600}
  .tznote{margin-top:12px;font-size:13px;color:var(--muted2)}
  .tznote b{color:var(--accent2)}

  /* Controls */
  .controls{
    position:sticky;top:0;z-index:30;background:var(--bg2);
    border-bottom:1px solid var(--line);padding:12px 16px;margin:0 -16px 22px;
  }
  .controls-inner{max-width:1080px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .seg button{
    border:0;background:transparent;color:var(--muted);font-weight:700;font-size:13px;
    padding:7px 16px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap
  }
  .seg button.on{background:linear-gradient(90deg,var(--accent),#15b88b);color:#04241c}
  .search{
    flex:1;min-width:140px;background:var(--card);border:1px solid var(--line);border-radius:999px;
    color:var(--text);padding:9px 16px;font-size:14px;outline:none
  }
  .search::placeholder{color:var(--muted2)}
  .lang-btn {
    background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:999px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;outline:none;
    display:inline-flex;align-items:center;gap:6px;transition:0.15s;
  }
  .lang-btn::after { content:"▼"; font-size:10px; opacity:0.6; }
  
  /* TV Modals */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; backdrop-filter:blur(4px); }
  .modal { 
    position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); 
    background:var(--bg2); border:1px solid var(--line); border-radius:12px; z-index:101; 
    width:360px; max-width:90vw; max-height:80vh; display:flex; flex-direction:column; 
    box-shadow:0 10px 40px rgba(0,0,0,0.5); 
  }
  .modal[hidden], .modal-overlay[hidden] { display:none !important; }
  .modal-body { padding:12px; overflow-y:auto; display:grid; gap:4px; overscroll-behavior:contain; }
  .modal-btn { 
    background:transparent; border:none; color:var(--text); padding:14px 16px; text-align:left; 
    border-radius:8px; cursor:pointer; font-size:16px; transition:0.1s; display:flex; justify-content:space-between;
  }
  .modal-btn.active { background:rgba(0, 217, 163, 0.15); color:var(--accent); font-weight:bold; }

  /* Day groups */
  .day{margin:26px 0 12px;display:flex;align-items:center;gap:12px}
  .day h2{font-size:16px;font-weight:800;color:var(--text);white-space:nowrap}
  .day .badge{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
    color:var(--gold);background:rgba(255,210,74,.12);padding:3px 10px;border-radius:999px}
  .day .rule{flex:1;height:1px;background:var(--line)}

  /* Match card */
  .grid{display:grid;gap:12px}
  .match{
    background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
    border-radius:var(--r);padding:14px 16px;display:grid;
    grid-template-columns:84px 1fr auto;gap:14px;align-items:center;box-shadow:var(--shadow);
    transition:.15s;
  }
  .match:hover{border-color:#33508a;transform:translateY(-1px)}
  .match.live{border-color:rgba(255,77,94,.5);box-shadow:0 0 0 1px rgba(255,77,94,.25),var(--shadow)}

  .when{text-align:center}
  .when .time{font-size:20px;font-weight:800;letter-spacing:-.5px}
  .when .ampm{font-size:11px;color:var(--muted);font-weight:700}
  .when .tag{margin-top:5px;font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 8px;border-radius:999px;display:inline-block}
  .tag.live{background:var(--live);color:#fff;animation:pulse 1.4s infinite}
  .tag.ft{background:#26324d;color:var(--muted)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

  .teams{display:flex;flex-direction:column;gap:9px;min-width:0}
  .team{display:flex;align-items:center;gap:11px;min-width:0}
  .team img{width:30px;height:22px;object-fit:cover;border-radius:3px;flex:none;
    box-shadow:0 0 0 1px rgba(255,255,255,.12);background:#26324d}
  .team .nm{font-size:15.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team .nm.tbd{color:var(--muted);font-weight:600;font-size:14px;white-space:normal}
  .team .sc{margin-left:auto;font-size:18px;font-weight:800;color:var(--gold);padding-left:10px}
  .team.lose .nm{color:var(--muted)}
  .team.lose .sc{color:var(--muted)}

  .meta{text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end;max-width:200px}
  .chip{font-size:11px;font-weight:800;letter-spacing:.4px;padding:3px 9px;border-radius:7px;
    background:rgba(59,130,246,.16);color:#9cc0ff;white-space:nowrap}
  .chip.ko{background:rgba(255,210,74,.14);color:var(--gold)}
  .venue{font-size:12px;color:var(--muted);line-height:1.35}
  .venue b{color:#b9c8e6;font-weight:700}

  /* Loading state — hide dynamic content until country/language is resolved (no flash) */
  .loader{display:none;justify-content:center;padding:90px 0}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);
    border-top-color:var(--accent);animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  body.booting .loader{display:flex}
  body.booting #list,body.booting #footer{display:none}
  body.booting .controls,body.booting #appTitle,body.booting #tznote{visibility:hidden}

  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:16px}
  footer{text-align:center;color:var(--muted2);font-size:12.5px;margin-top:40px;padding:0 10px;line-height:1.6}
  footer a{color:var(--accent2);text-decoration:none}
  footer a:hover{text-decoration:underline}

  .match .watch{grid-column:1/-1;display:flex;flex-wrap:wrap;align-items:center;gap:8px;
    border-top:1px dashed var(--line);margin-top:6px;padding-top:10px}
  .watch .wl{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.3px}
  .watch a{font-size:12.5px;font-weight:700;color:#cfe0ff;background:rgba(59,130,246,.16);
    padding:5px 11px;border-radius:8px;text-decoration:none;display:inline-flex;gap:6px;align-items:center}
  .watch a:hover{background:rgba(59,130,246,.30)}
  .watch a i{font-style:normal;opacity:.55;font-size:11px;text-transform:uppercase}
  #countrySel{max-width:160px}

  @media(max-width:560px){
    .match{grid-template-columns:64px 1fr;gap:10px;padding:12px}
    .meta{grid-column:1/-1;flex-direction:row;justify-content:flex-start;text-align:left;align-items:center;max-width:none;
      flex-wrap:wrap;border-top:1px solid var(--line);padding-top:9px;margin-top:2px}
    .meta .venue{order:2}
    .when .time{font-size:18px}
    .team .nm{font-size:14.5px}
  }

  /* TV / Landscape Large Screen Optimization (16:9 / 10-foot UI) */
  @media(min-width: 1080px) and (orientation: landscape) {
    .wrap { max-width: 1400px; padding: 0 40px 100px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    h1 { font-size: 54px; margin-bottom: 8px; }
    .hero { padding-top: 50px; padding-bottom: 40px; }
    .tznote { font-size: 16px; }
    .controls-inner { max-width: 1320px; }
    .match { padding: 20px 24px; gap: 20px; grid-template-columns: 100px 1fr auto; }
    .when .time { font-size: 26px; }
    .when .tag { font-size: 12px; padding: 4px 10px; }
    .team img { width: 38px; height: 28px; }
    .team .nm { font-size: 18px; }
    .team .sc { font-size: 22px; }
    .meta { font-size: 14px; gap: 12px; }
    .watch .wl { font-size: 14px; }
    .watch a { font-size: 15px; padding: 8px 16px; }
    .watch a i { font-size: 13px; }
  }
  @media(min-width: 1600px) and (orientation: landscape) {
    .wrap { max-width: 1800px; }
    .controls-inner { max-width: 1720px; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 24px; }
  }
  
  /* Focus states for Android TV D-Pad Navigation */
  :focus {
    outline: 3px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
    z-index: 10;
  }
  .watch a:focus {
    background: rgba(0, 217, 163, 0.15);
    color: var(--accent);
  }
  button:focus, input:focus, .modal-btn:focus {
    box-shadow: 0 0 15px rgba(0, 217, 163, 0.4);
    outline: 3px solid var(--accent);
    outline-offset: -2px;
  }
  .modal-btn:focus { background: var(--card2); }
  
  /* Modern browsers focus fallback */
  :focus:not(:focus-visible) {
    outline: none;
    box-shadow: none;
  }
  .watch a:focus:not(:focus-visible) {
    background: rgba(59,130,246,.16);
    color: #cfe0ff;
  }
</style>
</head>
<body class="booting">
<header class="hero">
  <div class="pitch"></div>
  <div class="crest">FIFA WORLD CUP</div>
  <h1 id="appTitle">2026 FIFA World Cup</h1>
  <div class="tznote" id="tznote"></div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="seg" id="filterSeg">
      <button data-f="upcoming" class="on" id="fUpcoming">Upcoming</button>
      <button data-f="all" id="fAll">All matches</button>
    </div>
    <input class="search" id="search" placeholder="Search team…" autocomplete="off">
    <button class="lang-btn" id="countryBtn" aria-label="Country"></button>
    <button class="lang-btn" id="langBtn" aria-label="Language"></button>
  </div>
</div>

<main class="wrap">
  <div class="loader" id="loader"><div class="spin"></div></div>
  <div id="list" class="grid"></div>
  <div class="empty" id="empty" hidden></div>
  <footer id="footer"></footer>
</main>

<!-- TV Optimized Modals -->
<div id="modalOverlay" class="modal-overlay" hidden></div>
<div id="countryModal" class="modal" hidden>
  <div class="modal-body" id="countryList"></div>
</div>
<div id="langModal" class="modal" hidden>
  <div class="modal-body" id="langList"></div>
</div>

/* IP → country (ISO-3166 alpha-2). PRIMARY = ipquery.io; the rest are fallbacks
   for resilience where a provider is blocked/rate-limited (e.g. mainland China).
   (ip.skk.moe is not used — no CORS headers, so cross-origin fetch fails; it stays
    a good manual check in a browser tab.) */
async function detectCountryIP(){
  const fetchT = (url, ms=2500) => {                       // fetch with timeout
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, {cache:"no-store", signal:ctrl.signal}).finally(() => clearTimeout(t));
  };
  const valid = cc => /^[A-Z]{2}$/.test(cc) ? cc : null;

  // PRIMARY: ipquery.io — single call returns the requester's own full JSON.
  try{
    const res = await fetchT("https://api.ipquery.io/?format=json");
    if(res.ok){
      const cc = valid((((await res.json()).location || {}).country_code || "").toUpperCase());
      if(cc) return cc;
    }
  }catch(e){ /* fall through to fallbacks */ }

  // FALLBACKS — each exposes the code under a slightly different field.
  const providers = [
    ["https://api.ip.sb/geoip",                  j => j.country_code],
    ["https://get.geojs.io/v1/ip/country.json",  j => j.country],
    ["https://api.country.is/",                  j => j.country],
    ["https://ipapi.co/json/",                   j => j.country_code]
  ];
  for(const [url, pick] of providers){
    try{
      const res = await fetchT(url);
      if(res.ok){
        const cc = valid((pick(await res.json()) || "").toString().toUpperCase());
        if(cc) return cc;
      }
    }catch(e){ /* try next */ }
  }
  return null;
}
function resolveLang(){
  const manual = localStorage.getItem("wc26lang");
  if(manual && LANGS.some(l=>l[0]===manual)) return manual;
  if(country && COUNTRY_LANG[country]) return COUNTRY_LANG[country];
  return detectLang();
}
function sourcesFor(matchNo){
  const localSources = (window.WC_SOURCES && country && window.WC_SOURCES[country]) || [];
  const validLocal = localSources.filter(s => !s.matchNo || s.matchNo===matchNo);
  
  // Clone fallbacks to avoid mutating the global array directly
  let fallbacks = (window.WC_SOURCES_FALLBACK || []).map(f => ({...f}));
  
  // Replace fallback URLs with specific stream URLs if available
  if (window.WC_AGGREGATE_STREAMS && window.WC_AGGREGATE_STREAMS[matchNo]) {
    const specificStreams = window.WC_AGGREGATE_STREAMS[matchNo];
    fallbacks.forEach(fallback => {
      // Find if we have a specific stream from the same domain
      let fallbackHost = "";
      try { fallbackHost = new URL(fallback.url).hostname.replace('www.', ''); } catch(e) {}
      
      const specific = specificStreams.find(s => {
        try { return new URL(s.url).hostname.replace('www.', '') === fallbackHost; } catch(e) { return false; }
      });
      
      if (specific) {
        fallback.url = specific.url;
        fallback.isDeepLink = true;
      }
    });
  }

  return [...validLocal, ...fallbacks];
}

function detectLang(){
  const supported = LANGS.map(l=>l[0]);
  for(const raw of (navigator.languages||[navigator.language||"en"])){
    const l = raw.toLowerCase();
    if(l.startsWith("zh")){
      if(/hant|tw|hk|mo/.test(l)) return "zh-Hant";
      return "zh-Hans";
    }
    const base = l.split("-")[0];
    const hit = supported.find(s=>s.toLowerCase()===l || s.toLowerCase().split("-")[0]===base);
    if(hit) return hit;
  }
  return "en";
}
const tt = k => (T[k] && (T[k][lang]||T[k].en)) || k;

let dnCache = {};
function countryName(code){
  if(NAME_OVERRIDE[code]) return NAME_OVERRIDE[code][lang]||NAME_OVERRIDE[code].en;
  try{
    if(window.Intl && Intl.DisplayNames){
      if(!dnCache[lang]) dnCache[lang] = new Intl.DisplayNames([lang],{type:"region"});
      return dnCache[lang].of(code.toUpperCase()) || code.toUpperCase();
    }
  }catch(e){}
  return code.toUpperCase();
}
const flagURL = code => `https://flagcdn.com/w80/${code}.png`;

function fmtTime(date){
  return new Intl.DateTimeFormat(lang,{hour:"numeric",minute:"2-digit"}).format(date);
}
function dayKey(date){
  return new Intl.DateTimeFormat("en-CA",{year:"numeric",month:"2-digit",day:"2-digit"}).format(date);
}
function dayLabel(date){
  const now = new Date();
  const k = dayKey(date), tk = dayKey(now);
  const tm = new Date(now.getTime()+86400000);
  if(k===tk) return {label:tt("today"), badge:true};
  if(k===dayKey(tm)) return {label:tt("tomorrow"), badge:true};
  return {label:new Intl.DateTimeFormat(lang,{weekday:"long",day:"numeric",month:"long"}).format(date), badge:false};
}
function roundName(m){ return m.g ? `${tt("group")} ${m.g}` : tt(m.r); }

/* Render one team side */
function sideHTML(side, m, idx){
  // side === undefined → TBD
  if(side===undefined){
    return `<div class="team"><img alt="" src="${flagURL('un')}" onerror="this.style.visibility='hidden'"><span class="nm tbd">—</span></div>`;
  }
  if(typeof side==="object"){ // knockout slot
    const word = tt(side.k);
    const label = side.k==="third" ? `${word} (${side.g})` : `${word} · ${tt("group")} ${side.g}`;
    return `<div class="team"><span class="nm tbd">${label}</span></div>`;
  }
  // country code
  const name = countryName(side);
  let sc = "", cls="";
  if(m.s){
    const val = idx===0?m.s[0]:m.s[1];
    sc = `<span class="sc">${val}</span>`;
    const other = idx===0?m.s[1]:m.s[0];
    if(val<other) cls=" lose";
  }
  return `<div class="team${cls}">
    <img alt="${name}" loading="lazy" src="${flagURL(side)}" onerror="this.src='https://flagcdn.com/w80/un.png';this.style.opacity=.4">
    <span class="nm">${name}</span>${sc}</div>`;
}

function render(){
  const now = Date.now();
  const q = query.trim().toLowerCase();
  const list = document.getElementById("list");
  const empty = document.getElementById("empty");
  list.innerHTML = "";

  const rows = M.filter(m=>{
    const t = new Date(m.d).getTime();
    const finished = m.s || (now > t + MATCH_LEN);
    if(filter==="upcoming" && finished) return false;
    if(q){
      const names = [];
      [m.h,m.a].forEach(s=>{ if(typeof s==="string") names.push(countryName(s).toLowerCase(), s); });
      if(!names.some(n=>n.includes(q))) return false;
    }
    return true;
  }).sort((a,b)=> new Date(a.d)-new Date(b.d));

  if(!rows.length){
    empty.hidden=false; empty.textContent=tt("empty"); return;
  }
  empty.hidden=true;

  let curDay = "", frag = document.createDocumentFragment();
  rows.forEach(m=>{
    const dt = new Date(m.d);
    const dk = dayKey(dt);
    if(dk!==curDay){
      curDay = dk;
      const dl = dayLabel(dt);
      const head = document.createElement("div");
      head.className="day";
      head.innerHTML = `<h2>${dl.label}</h2>${dl.badge?`<span class="badge">${dl.label===tt("today")?"●":"›"}</span>`:""}<div class="rule"></div>`;
      frag.appendChild(head);
    }
    const t = dt.getTime();
    const live = !m.s && now>=t && now<=t+MATCH_LEN;
    const finished = m.s || now>t+MATCH_LEN;

    const card = document.createElement("div");
    card.className = "match"+(live?" live":"");
    const parts = fmtTime(dt).split(/\s+/);
    const timeMain = parts[0], ampm = parts.slice(1).join(" ");
    let statusTag = "";
    if(live) statusTag = `<span class="tag live">${tt("live")}</span>`;
    else if(finished) statusTag = `<span class="tag ft">${tt("ft")}</span>`;

    card.innerHTML = `
      <div class="when">
        <div class="time">${timeMain}</div>
        ${ampm?`<div class="ampm">${ampm}</div>`:""}
        ${statusTag}
      </div>
      <div class="teams">
        ${sideHTML(m.h,m,0)}
        ${sideHTML(m.a,m,1)}
      </div>
      <div class="meta">
        <span class="chip ${m.g?"":"ko"}">${roundName(m)}</span>
        <span class="venue"><b>${m.c}</b><br>${V[m.c]||""}</span>
      </div>
      ${(()=>{const s=sourcesFor(m.n);return s.length?`<div class="watch"><span class="wl">📺 ${tt("watch")}</span>${s.map(x=>`<a href="${x.url||'#'}" target="_blank" rel="noopener">${x.isDeepLink?'▶️ ':''}${x.name}${x.lang?` <i>${x.lang}</i>`:""}</a>`).join("")}</div>`:"";})()}`;
    frag.appendChild(card);
  });
  list.appendChild(frag);
}

/* ---------- UI strings ---------- */
function applyStrings(){
  document.documentElement.lang = lang;
  document.getElementById("appTitle").textContent = tt("title");
  document.title = tt("title")+" — "+(LANGS.find(l=>l[0]===lang)?.[1]||"");
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const loc = country ? ` &nbsp;·&nbsp; 📍 <b>${countryEndonym(country)}</b>` : "";
  document.getElementById("tznote").innerHTML = `${tt("tz")} <b>${tz}</b>${loc}`;
  document.getElementById("fUpcoming").textContent = tt("upcoming");
  document.getElementById("fAll").textContent = tt("all");
  document.getElementById("search").placeholder = tt("search");
  populateCountrySelect();
  const url="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/scores-fixtures";
  let freshness = "";
  if(LAST_VERIFIED){
    const d = new Date(LAST_VERIFIED+"T00:00:00");
    const ds = new Intl.DateTimeFormat(lang,{year:"numeric",month:"long",day:"numeric"}).format(d);
    freshness = `<br><span style="color:var(--accent)">✓ ${tt("verified")} ${ds}</span>`;
  }
  document.getElementById("footer").innerHTML =
    `${tt("footer")} <a href="${url}" target="_blank" rel="noopener">${tt("fifaSite")}</a>.${freshness}`;
}

function populateCountrySelect(){
  const btn = document.getElementById("countryBtn");
  const listEl = document.getElementById("countryList");
  if(!btn || !listEl) return;
  
  const list = COUNTRIES.slice();
  if(country && !list.includes(country)) list.push(country);
  
  let enName = c => c;
  try{
    if(window.Intl && Intl.DisplayNames){
      if(!endoCache.en) endoCache.en = new Intl.DisplayNames(["en"],{type:"region"});
      enName = c => { try{ return endoCache.en.of(c)||c; }catch(e){ return c; } };
    }
  }catch(e){}

  // Label = endonym (country's own language); sort by English name for a stable order.
  const opts = list.map(c=>({c,label:countryEndonym(c),key:enName(c)}))
                   .sort((a,b)=>a.key.localeCompare(b.key,"en"));
                   
  listEl.innerHTML = opts.map(o=>`<button class="modal-btn ${o.c===country?'active':''}" data-val="${o.c}">${o.label} ${o.c===country?'✓':''}</button>`).join("");
  
  if(country) {
    const selectedOpt = opts.find(o=>o.c===country);
    btn.textContent = selectedOpt ? selectedOpt.label : country;
  }
}

function populateLangSelect(){
  const btn = document.getElementById("langBtn");
  const listEl = document.getElementById("langList");
  if(!btn || !listEl) return;
  
  listEl.innerHTML = LANGS.map(([code,name]) => 
    `<button class="modal-btn ${code===lang?'active':''}" data-val="${code}">${name} ${code===lang?'✓':''}</button>`
  ).join("");
  
  const selectedOpt = LANGS.find(l=>l[0]===lang);
  btn.textContent = selectedOpt ? selectedOpt[1] : lang;
}

/* ---------- TV Modals Logic ---------- */
let activeModal = null;
function openModal(id){
  const m = document.getElementById(id);
  const ov = document.getElementById("modalOverlay");
  if(!m || !ov) return;
  m.hidden = false; ov.hidden = false;
  activeModal = m;
  const activeBtn = m.querySelector('.modal-btn.active') || m.querySelector('.modal-btn');
  if(activeBtn) setTimeout(()=>activeBtn.focus(), 50);
}
function closeModal(){
  if(!activeModal) return;
  activeModal.hidden = true;
  document.getElementById("modalOverlay").hidden = true;
  if(activeModal.id === "countryModal") document.getElementById("countryBtn").focus();
  if(activeModal.id === "langModal") document.getElementById("langBtn").focus();
  activeModal = null;
}
document.getElementById("modalOverlay").addEventListener("click", closeModal);
document.addEventListener("keydown", e => {
  if((e.key === "Escape" || e.keyCode === 27) && activeModal) closeModal();
});

// Modal Event Delegation
document.getElementById("countryList").addEventListener("click", e => {
  const b = e.target.closest(".modal-btn");
  if(!b) return;
  country = b.dataset.val; localStorage.setItem("wc26country", country);
  if(!localStorage.getItem("wc26lang")){ lang = langForCountry(country); }
  closeModal();
  applyStrings(); populateCountrySelect(); populateLangSelect(); render();
});
document.getElementById("langList").addEventListener("click", e => {
  const b = e.target.closest(".modal-btn");
  if(!b) return;
  lang = b.dataset.val; localStorage.setItem("wc26lang", lang);
  closeModal();
  applyStrings(); populateCountrySelect(); populateLangSelect(); render();
});

document.getElementById("countryBtn").addEventListener("click", () => openModal("countryModal"));
document.getElementById("langBtn").addEventListener("click", () => openModal("langModal"));

/* ---------- Init ---------- */
function reveal(){ document.body.classList.remove("booting"); }

async function init(){
  // 在首屏渲染前确定国家/语言，避免「猜测值 → IP 值」二次渲染闪烁
  const savedCountry = localStorage.getItem("wc26country");
  if(savedCountry){
    country = savedCountry;                   // 用户手动选过 → 立即用，无需联网
  } else {
    country = provisionalCountry();           // 时区/语言临时猜测
    // await IP 定位，但封顶等待，防止慢/被墙的源把页面卡住
    const ipC = await Promise.race([ detectCountryIP(), new Promise(r=>setTimeout(()=>r(null),2200)) ]);
    if(ipC) country = ipC;
  }
  
  try {
    const res = await fetch("streams.json");
    if(res.ok) window.WC_AGGREGATE_STREAMS = await res.json();
  } catch(e) {}
  
  lang = resolveLang();
  
  document.getElementById("filterSeg").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b) return;
    filter=b.dataset.f;
    [...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));
    render();
  });
  document.getElementById("search").addEventListener("input",e=>{query=e.target.value;render();});

  applyStrings();
  populateCountrySelect();
  populateLangSelect();
  render();                                   // ← 唯一一次渲染，首屏即正确
  reveal();                                   // ← 移除 body.booting，显示内容
  
  // refresh LIVE/FT status every minute
  setInterval(render, 60000);
}

// 兜底：任何异常/超时都不能把页面卡在转圈上
setTimeout(reveal, 6000);
init().catch(reveal);
</script>
