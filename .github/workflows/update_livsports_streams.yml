name: Update Livsports Streaming Links

on:
  schedule:
    # Run every hour at minute 10 and 40
    - cron: '10,40 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright urllib3

      - name: Run Livsports.dpdns.org Crawler
        run: |
          cd streaming_crawlers
          python livsports_streaming_crawler.py

      - name: Ensure latest changes are pulled before pushing
        run: |
          git pull --rebase origin main || true
          git push origin main || true
