name: Update Footreplays Streaming Links

on:
  schedule:
    # Run once a day at 03:00 UTC for match replays
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run Footreplays Crawler
        run: |
          cd streaming_crawlers
          python footreplays_crawler.py

      - name: Ensure latest changes are pulled before pushing
        run: |
          git pull --rebase origin main || true
          git push origin main || true
