<style>
  :root{
    --bg:#0a0e1a; --bg2:#0f1626; --card:#141d33; --card2:#1a2541;
    --line:#243353; --text:#eef3ff; --muted:#8da2c9; --muted2:#5d6f95;
    --accent:#00d9a3; --accent2:#3b82f6; --gold:#ffd24a; --live:#ff4d5e;
    --r:16px; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue","PingFang SC","Microsoft YaHei","Noto Sans",Arial,sans-serif;
    background:radial-gradient(1200px 700px at 80% -10%,#16224a 0%,transparent 55%),
               radial-gradient(900px 600px at -10% 10%,#0c2f2a 0%,transparent 50%),
               var(--bg);
    color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px 80px}

  header.hero{
    padding:34px 16px 26px;text-align:center;position:relative;overflow:hidden;
  }
  .hero .pitch{
    position:absolute;inset:0;opacity:.06;pointer-events:none;
    background:
      repeating-linear-gradient(90deg,transparent 0 60px,#fff 60px 62px);
  }
  .crest{font-size:13px;letter-spacing:3px;color:var(--accent);font-weight:700;text-transform:uppercase}
  h1{font-size:clamp(26px,5vw,44px);font-weight:800;margin:6px 0 4px;letter-spacing:-.5px;
     background:linear-gradient(90deg,#fff, #bcd2ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hosts{color:var(--muted);font-size:15px;font-weight:600}
  .tznote{margin-top:12px;font-size:13px;color:var(--muted2)}
  .tznote b{color:var(--accent2)}

  /* Controls */
  .controls{
    position:sticky;top:0;z-index:30;background:var(--bg2);
    border-bottom:1px solid var(--line);padding:12px 16px;margin:0 -16px 22px;
  }
  .controls-inner{max-width:1080px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .seg button{
    border:0;background:transparent;color:var(--muted);font-weight:700;font-size:13px;
    padding:7px 16px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap
  }
  .seg button.on{background:linear-gradient(90deg,var(--accent),#15b88b);color:#04241c}
  .search{
    flex:1;min-width:140px;background:var(--card);border:1px solid var(--line);border-radius:999px;
    color:var(--text);padding:9px 16px;font-size:14px;outline:none
  }
  .search::placeholder{color:var(--muted2)}
  .lang-btn {
    background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:999px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;outline:none;
    display:inline-flex;align-items:center;gap:6px;transition:0.15s;
  }
  .lang-btn::after { content:"▼"; font-size:10px; opacity:0.6; }
  
  /* TV Modals */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; backdrop-filter:blur(4px); }
  .modal { 
    position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); 
    background:var(--bg2); border:1px solid var(--line); border-radius:12px; z-index:101; 
    width:360px; max-width:90vw; max-height:80vh; display:flex; flex-direction:column; 
    box-shadow:0 10px 40px rgba(0,0,0,0.5); 
  }
  .modal[hidden], .modal-overlay[hidden] { display:none !important; }
  .modal-body { padding:12px; overflow-y:auto; display:grid; gap:4px; overscroll-behavior:contain; }
  .modal-btn { 
    background:transparent; border:none; color:var(--text); padding:14px 16px; text-align:left; 
    border-radius:8px; cursor:pointer; font-size:16px; transition:0.1s; display:flex; justify-content:space-between;
  }
  .modal-btn.active { background:rgba(0, 217, 163, 0.15); color:var(--accent); font-weight:bold; }

  /* Share Modal Specific */
  #shareModal { text-align:center; padding: 24px 20px; }
  .share-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .share-desc { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.4; }
  .share-qr { background: #fff; padding: 10px; border-radius: 8px; display: inline-block; align-self: center; margin-bottom: 20px; }
  .share-qr img { width: 160px; height: 160px; display: block; margin: 0 auto; }
  .share-actions { display: flex; gap: 10px; justify-content: center; }
  .btn-primary { 
    background: linear-gradient(90deg,var(--accent),#15b88b); color: #04241c; 
    border: none; padding: 10px 20px; border-radius: 999px; font-weight: 700; cursor: pointer; transition: 0.15s; flex: 1;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--card2); color: var(--text); border: 1px solid var(--line);
    padding: 10px 20px; border-radius: 999px; font-weight: 600; cursor: pointer; transition: 0.15s; flex: 1;
  }
  .btn-secondary:hover { background: var(--line); }

  /* Social Share Icons */
  .social-share-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
  .social-icon { 
    display: flex; align-items: center; justify-content: center; 
    width: 44px; height: 44px; border-radius: 50%; background: var(--card2);
    transition: 0.2s; cursor: pointer; text-decoration: none;
  }
  .social-icon:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .social-icon svg { width: 22px; height: 22px; fill: white; }
  .si-wa { background: #25D366; }
  .si-fb { background: #1877F2; }
  .si-x { background: #000000; }
  .si-tg { background: #229ED9; }
  .si-native { background: var(--accent); }

  /* Day groups */
  .day{margin:26px 0 12px;display:flex;align-items:center;gap:12px}
  .day h2{font-size:16px;font-weight:800;color:var(--text);white-space:nowrap}
  .day .badge{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
    color:var(--gold);background:rgba(255,210,74,.12);padding:3px 10px;border-radius:999px}
  .day .rule{flex:1;height:1px;background:var(--line)}

  /* Match card */
  .grid{display:grid;gap:12px}
  .match{
    background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
    border-radius:var(--r);padding:14px 16px;display:grid;
    grid-template-columns:84px 1fr auto;gap:14px;align-items:center;box-shadow:var(--shadow);
    transition:.15s;
  }
  .match:hover{border-color:#33508a;transform:translateY(-1px)}
  .match.live{border-color:rgba(255,77,94,.5);box-shadow:0 0 0 1px rgba(255,77,94,.25),var(--shadow)}

  .when{text-align:center}
  .when .time{font-size:20px;font-weight:800;letter-spacing:-.5px}
  .when .ampm{font-size:11px;color:var(--muted);font-weight:700}
  .when .tag{margin-top:5px;font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 8px;border-radius:999px;display:inline-block}
  .tag.live{background:var(--live);color:#fff;animation:pulse 1.4s infinite}
  .tag.ft{background:#26324d;color:var(--muted)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

  .teams{display:flex;flex-direction:column;gap:9px;min-width:0}
  .team{display:flex;align-items:center;gap:11px;min-width:0}
  .team img{width:30px;height:22px;object-fit:cover;border-radius:3px;flex:none;
    box-shadow:0 0 0 1px rgba(255,255,255,.12);background:#26324d}
  .team .nm{font-size:15.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team .nm.tbd{color:var(--muted);font-weight:600;font-size:14px;white-space:normal}
  .team .sc{margin-left:auto;font-size:18px;font-weight:800;color:var(--gold);padding-left:10px}
  .team.lose .nm{color:var(--muted)}
  .team.lose .sc{color:var(--muted)}

  .meta{text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end;max-width:200px}
  .chip{font-size:11px;font-weight:800;letter-spacing:.4px;padding:3px 9px;border-radius:7px;
    background:rgba(59,130,246,.16);color:#9cc0ff;white-space:nowrap}
  .chip.ko{background:rgba(255,210,74,.14);color:var(--gold)}
  .venue{font-size:12px;color:var(--muted);line-height:1.35}
  .venue b{color:#b9c8e6;font-weight:700}

  /* Loading state — hide dynamic content until country/language is resolved (no flash) */
  .loader{display:none;justify-content:center;padding:90px 0}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);
    border-top-color:var(--accent);animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  body.booting .loader{display:flex}
  body.booting #list,body.booting #footer{display:none}
  body.booting .controls,body.booting #appTitle,body.booting #tznote{visibility:hidden}

  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:16px}
  footer{text-align:center;color:var(--muted2);font-size:12.5px;margin-top:40px;padding:0 10px;line-height:1.6}
  footer a{color:var(--accent2);text-decoration:none}
  footer a:hover{text-decoration:underline}

  .match .watch{grid-column:1/-1;display:flex;flex-wrap:wrap;align-items:center;gap:8px;
    border-top:1px dashed var(--line);margin-top:6px;padding-top:10px}
  .watch .wl{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.3px}
  .watch a{font-size:12.5px;font-weight:700;color:#cfe0ff;background:rgba(59,130,246,.16);
    padding:5px 11px;border-radius:8px;text-decoration:none;display:inline-flex;gap:6px;align-items:center}
  .watch a:hover{background:rgba(59,130,246,.30)}
  .watch a i{font-style:normal;opacity:.55;font-size:11px;text-transform:uppercase}
  #countrySel{max-width:160px}

  @media(max-width:560px){
    .match{grid-template-columns:64px 1fr;gap:10px;padding:12px}
    .meta{grid-column:1/-1;flex-direction:row;justify-content:flex-start;text-align:left;align-items:center;max-width:none;
      flex-wrap:wrap;border-top:1px solid var(--line);padding-top:9px;margin-top:2px}
    .meta .venue{order:2}
    .when .time{font-size:18px}
    .team .nm{font-size:14.5px}
  }

  /* TV / Landscape Large Screen Optimization (16:9 / 10-foot UI) */
  @media(min-width: 1080px) and (orientation: landscape) {
    .wrap { max-width: 1400px; padding: 0 40px 100px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    h1 { font-size: 54px; margin-bottom: 8px; }
    .hero { padding-top: 50px; padding-bottom: 40px; }
    .tznote { font-size: 16px; }
    .controls-inner { max-width: 1320px; }
    .match { padding: 20px 24px; gap: 20px; grid-template-columns: 100px 1fr auto; }
    .when .time { font-size: 26px; }
    .when .tag { font-size: 12px; padding: 4px 10px; }
    .team img { width: 38px; height: 28px; }
    .team .nm { font-size: 18px; }
    .team .sc { font-size: 22px; }
    .meta { font-size: 14px; gap: 12px; }
    .watch .wl { font-size: 14px; }
    .watch a { font-size: 15px; padding: 8px 16px; }
    .watch a i { font-size: 13px; }
  }
  @media(min-width: 1600px) and (orientation: landscape) {
    .wrap { max-width: 1800px; }
    .controls-inner { max-width: 1720px; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 24px; }
  }
  
  /* Focus states for Android TV D-Pad Navigation */
  :focus {
    outline: 3px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
    z-index: 10;
  }
  .watch a:focus {
    background: rgba(0, 217, 163, 0.15);
    color: var(--accent);
  }
  button:focus, input:focus, .modal-btn:focus {
    box-shadow: 0 0 15px rgba(0, 217, 163, 0.4);
    outline: 3px solid var(--accent);
    outline-offset: -2px;
  }
  .modal-btn:focus { background: var(--card2); }
  
  /* Modern browsers focus fallback */
  :focus:not(:focus-visible) {
    outline: none;
    box-shadow: none;
  }
  .watch a:focus:not(:focus-visible) {
    background: rgba(59,130,246,.16);
    color: #cfe0ff;
  }
</style>

/* IP → country (ISO-3166 alpha-2). PRIMARY = ipquery.io; the rest are fallbacks
   for resilience where a provider is blocked/rate-limited (e.g. mainland China).

async function detectCountryIP(){
  const fetchT = (url, ms=2500) => {                       // fetch with timeout
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, {cache:"no-store", signal:ctrl.signal}).finally(() => clearTimeout(t));
  };
  const valid = cc => /^[A-Z]{2}$/.test(cc) ? cc : null;

  // PRIMARY: ipquery.io — single call returns the requester's own full JSON.
  try{
    const res = await fetchT("https://api.ipquery.io/?format=json");
    if(res.ok){
      const cc = valid((((await res.json()).location || {}).country_code || "").toUpperCase());
      if(cc) return cc;
    }
  }catch(e){ /* fall through to fallbacks */ }

  // FALLBACKS — each exposes the code under a slightly different field.
  const providers = [
    ["https://api.ip.sb/geoip",                  j => j.country_code],
    ["https://get.geojs.io/v1/ip/country.json",  j => j.country],
    ["https://api.country.is/",                  j => j.country],
    ["https://ipapi.co/json/",                   j => j.country_code]
  ];
  for(const [url, pick] of providers){
    try{
      const res = await fetchT(url);
      if(res.ok){

        if(cc) return cc;

    }catch(e){ /* try next */ }
  }
  return null;
}

function sourcesFor(matchNo){
  const localSources = (window.WC_SOURCES && country && window.WC_SOURCES[country]) || [];
  let validLocal = localSources.filter(s => !s.matchNo || s.matchNo===matchNo).map(s => ({...s}));

  let fallbacks = (window.WC_SOURCES_FALLBACK || []).map(f => ({...f}));

  if (window.WC_AGGREGATE_STREAMS && window.WC_AGGREGATE_STREAMS[matchNo]) {
    const specificStreams = window.WC_AGGREGATE_STREAMS[matchNo];
    let newFallbacks = [];
    let matchedSpecifics = new Set();

    // 1. Replace fallbacks with their corresponding specific streams (deep links)
    fallbacks.forEach(fallback => {
      let fallbackHost = "";
      try { fallbackHost = new URL(fallback.url).hostname.replace('www.', ''); } catch(e) {}
      
      const specifics = specificStreams.filter(s => {
        try { return new URL(s.source).hostname.replace('www.', '') === fallbackHost; } catch(e) { return false; }
      });
      
      if (specifics.length > 0) {
        specifics.forEach((spec, idx) => {
          matchedSpecifics.add(spec);
          newFallbacks.push({
            name: specifics.length > 1 ? `${fallback.name} #${idx+1}` : fallback.name,
            url: spec.url,
            isDeepLink: true
          });
        });
      } else {
        newFallbacks.push(fallback);
      }
    });

    // 2. Append any specific streams that didn't match a fallback
    specificStreams.forEach((spec, idx) => {
      if (!matchedSpecifics.has(spec)) {
        let specHost = "Stream";
        try { specHost = new URL(spec.source).hostname.replace(/^www\./, ''); } catch(e) {}
        
        let name = "";
        // CRITICAL RULE: DO NOT REMOVE OR OVERWRITE the "Full Match Replay" condition.
        // It guarantees the internationalization (tt("replay")) applies correctly for match replays.
        if (spec.text === "Full Match Replay") {
          name = `${specHost} — ${tt("replay")}`;
        } else if (spec.text) {
          name = `${specHost} — ${spec.text}`;
        } else {
          name = `${specHost} (Link)`;
        }
        
        newFallbacks.push({
          name: name,
          url: spec.url,
          isDeepLink: true
        });
      }
    });

    fallbacks = newFallbacks;
  }

  if (window.WC_OFFICIAL_STREAMS && window.WC_OFFICIAL_STREAMS[matchNo]) {
    const specificOfficials = window.WC_OFFICIAL_STREAMS[matchNo];
    let newValidLocal = [];
    let matchedOfficials = new Set();

    validLocal.forEach(localSrc => {
      let localHost = "";
      try { localHost = new URL(localSrc.url).hostname.replace('www.', ''); } catch(e) {}
      const specifics = specificOfficials.filter(s => {
        try { return new URL(s.source).hostname.replace('www.', '') === localHost; } catch(e) { return false; }
      });
      
      if (specifics.length > 0) {
        specifics.forEach((spec, idx) => {
          matchedOfficials.add(spec);
          newValidLocal.push({
            name: specifics.length > 1 ? `${localSrc.name} #${idx+1}` : localSrc.name,
            url: spec.url,
            isDeepLink: true
          });
        });
      } else {
        newValidLocal.push(localSrc);
      }
    });

    specificOfficials.forEach((spec, idx) => {
      if (!matchedOfficials.has(spec)) {
        let specHost = "Official";
        try { specHost = new URL(spec.source).hostname.replace('www.', ''); } catch(e) {}
        newValidLocal.push({
          name: `${specHost} (Link)`,
          url: spec.url,
          isDeepLink: true
        });
      }
    });

    validLocal = newValidLocal;
  }

  // If WC_SOURCES_FALLBACK was cached out or missing, but we HAVE streams.json,
  // we still want to show the streams!
  if (fallbacks.length === 0 && window.WC_AGGREGATE_STREAMS && window.WC_AGGREGATE_STREAMS[matchNo]) {
    window.WC_AGGREGATE_STREAMS[matchNo].forEach((spec, idx) => {
      let specHost = "Stream";
      try { specHost = new URL(spec.source).hostname.replace(/^www\./, ''); } catch(e) {}
      
      // Override text for specific tags to make them stand out and localized
      let name = "";
      if (spec.text === "Full Match Replay") {
        name = `${specHost} — ${tt("replay")}`;
      } else if (spec.text) {
        // If there's text but it's not the exact replay string, just show it
        name = `${specHost} — ${spec.text}`;
      } else {
        name = `${specHost} (Link)`;
      }
      
      fallbacks.push({
        name: name,
        url: spec.url,
        isDeepLink: true
      });
    });
  }

  return [...validLocal, ...fallbacks];
}

function detectLang(){
  const supported = LANGS.map(l=>l[0]);
  for(const raw of (navigator.languages||[navigator.language||"en"])){
    const l = raw.toLowerCase();
    if(l.startsWith("zh")){
      if(/hant|tw|hk|mo/.test(l)) return "zh-Hant";
      return "zh-Hans";
    }
    const base = l.split("-")[0];
    const hit = supported.find(s=>s.toLowerCase()===l || s.toLowerCase().split("-")[0]===base);
    if(hit) return hit;
  }
  return "en";
}

/* ---------- Live status & scores from the official FIFA API (runtime) ----------
   Authoritative LIVE/Full-time badge + live scores. Polled every 60s; degrades
   gracefully to the kickoff-time-window heuristic when offline/unreachable.
   FIFA MatchStatus: 0 = finished, 1 = not started, 3 = live. */
const FIFA3_ISO = {MEX:"mx",RSA:"za",KOR:"kr",CZE:"cz",CAN:"ca",BIH:"ba",QAT:"qa",SUI:"ch",BRA:"br",MAR:"ma",HAI:"ht",SCO:"gb-sct",USA:"us",PAR:"py",AUS:"au",TUR:"tr",GER:"de",CUW:"cw",CIV:"ci",ECU:"ec",NED:"nl",JPN:"jp",SWE:"se",TUN:"tn",IRN:"ir",NZL:"nz",BEL:"be",EGY:"eg",ESP:"es",CPV:"cv",KSA:"sa",URU:"uy",FRA:"fr",SEN:"sn",IRQ:"iq",NOR:"no",ARG:"ar",ALG:"dz",AUT:"at",JOR:"jo",POR:"pt",COD:"cd",UZB:"uz",COL:"co",ENG:"gb-eng",CRO:"hr",GHA:"gh",PAN:"pa"};
const FIFA_API = "https://api.fifa.com/api/v3/calendar/matches?idCompetition=17&idSeason=285023&count=120&language=en";
let liveData = {};   // sorted-iso-pair -> { h, hs, as, status, min }

async function fetchLiveData(){
  try{
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), 6000);          // 6s timeout
    const res = await fetch(FIFA_API, {cache:"no-store", signal:ctrl.signal});
    clearTimeout(t);
    if(!res.ok) return false;
    const rows = (await res.json()).Results || [];
    const ab = x => x && (x.Abbreviation || x.IdCountry);
    const next = {};
    rows.forEach(m=>{
      const h = FIFA3_ISO[ab(m.Home)], a = FIFA3_ISO[ab(m.Away)];
      if(!h || !a) return;                                  // Skip placeholder knockouts
      next[[h,a].sort().join("|")] = {
        h, hs: m.Home && m.Home.Score, as: m.Away && m.Away.Score,
        status: m.MatchStatus, min: m.MatchTime || ""
      };
    });
    if(Object.keys(next).length){ liveData = next; return true; }
  }catch(e){ /* offline / unreachable → keep heuristic */ }
  return false;
}

// Resolve match state: FIFA if authoritative, else time window heuristic
function matchState(m, now){
  const pair = (typeof m.h==="string" && typeof m.a==="string") ? [m.h,m.a].sort().join("|") : null;
  const ld = pair ? liveData[pair] : null;
  const t = new Date(m.d).getTime(), len = matchLen(m);
  let score = m.s || null;
  // Score direction correction: FIFA home/away might differ from our h/a
  if(ld && ld.hs!=null && ld.as!=null) score = (ld.h===m.h) ? [ld.hs, ld.as] : [ld.as, ld.hs];
  if(ld && ld.status!=null && ld.status!==1){          // FIFA has authoritative state (not "Not Started")
    return { live: ld.status===3, finished: ld.status===0, score, min: ld.min };
  }
  // Fallback: kickoff time window
  return { live: !score && now>=t && now<=t+len, finished: !!score || now>t+len, score, min:"" };
}

/* Render one team side */
function sideHTML(side, score, idx){
  // side === undefined → TBD
  if(side===undefined){
    return `<div class="team"><img alt="" src="${flagURL('un')}" onerror="this.style.visibility='hidden'"><span class="nm tbd">—</span></div>`;
  }
  if(typeof side==="object"){ // knockout slot
    const word = tt(side.k);
    const label = side.k==="third" ? `${word} (${side.g})` : `${word} · ${tt("group")} ${side.g}`;
    return `<div class="team"><span class="nm tbd">${label}</span></div>`;
  }
  // country code
  const name = countryName(side);
  let sc = "", cls="";
  if(score){
    const val = idx===0?score[0]:score[1];
    sc = `<span class="sc">${val}</span>`;
    const other = idx===0?score[1]:score[0];
    if(val<other) cls=" lose";
  }
  return `<div class="team${cls}">
    <img alt="${name}" loading="lazy" src="${flagURL(side)}" onerror="this.src='https://flagcdn.com/w80/un.png';this.style.opacity=.4">
    <span class="nm">${name}</span>${sc}</div>`;
}

  const tgBtn = document.getElementById("shareTg");
  if (tgBtn) tgBtn.href = `https://t.me/share/url?url=${encodedUrl}&text=${encodedTitle}`;
  
  if (!isExplicit) {
    // Delay opening the modal slightly so the user sees the new tab open first
    setTimeout(() => openModal("shareModal"), 500);
  } else {
    openModal("shareModal");
  }
}

}

if (copyBtn) {

    try {
      await navigator.clipboard.writeText(window.location.origin + window.location.pathname);
