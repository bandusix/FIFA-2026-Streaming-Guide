name: Update Schedule & Live Status

on:
  schedule:
    # Run every 15 minutes (GitHub Actions cron can be delayed, 15 is a safe minimum)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Schedule Updater
        run: python auto_update_schedule.py

      - name: Commit and Push Changes
        run: |
          # We don't need to do anything here because auto_update_schedule.py handles it
          echo "Done"
